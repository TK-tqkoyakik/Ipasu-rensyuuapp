<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITパスポート・クエスト 改訂版</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --bg: #f4f7f6; --card: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .header { background: var(--primary); color: white; padding: 12px; display: flex; justify-content: space-between; font-size: 14px; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .option { background: #f8f9fa; border: 2px solid #ddd; border-radius: 8px; padding: 12px; margin: 8px 0; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; cursor: pointer; color: #7f8c8d; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .main-btn { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; font-weight: bold; cursor: pointer; }
        .item-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .item-slot { aspect-ratio: 1; background: #eee; border-radius: 5px; font-size: 8px; display: flex; align-items: center; justify-content: center; text-align: center; border: 1px solid #ccc; }
        .item-slot.owned { background: #fff; border-color: var(--accent); color: #333; }
    </style>
</head>
<body>

<div class="header">
    <div>称号: <span id="rank">IT初学者</span></div>
    <div><span id="kp" style="background:var(--accent); padding:2px 8px; border-radius:10px;">0</span> KP</div>
</div>

<div class="container" id="main-content">
    <div class="card"><h2>起動中...</h2><p>しばらくお待ちください。</p></div>
</div>

<nav class="nav">
    <div class="nav-item active" id="nav-quest" onclick="changeTab('quest')"><span>クエスト</span></div>
    <div class="nav-item" id="nav-gacha" onclick="changeTab('gacha')"><span>ガチャ</span></div>
    <div class="nav-item" id="nav-collection" onclick="changeTab('collection')"><span>図鑑</span></div>
    <div class="nav-item" id="nav-status" onclick="changeTab('status')"><span>分析</span></div>
</nav>

<script>
    // 100種類のアイテムをあらかじめ定義
    const masterItems = Array.from({length: 100}, (_, i) => ({
        id: i, 
        name: ["LANケーブル", "マウス", "ルーター", "サーバー", "AIの心", "光の剣"][i % 6] + (i + 1),
        rarity: i < 5 ? 'L' : i < 15 ? 'UR' : i < 30 ? 'SR' : 'C'
    }));

    let db = [];
    let save = JSON.parse(localStorage.getItem('itp_fixed_save')) || {
        kp: 100, totalCorrect: 0, stats: { s: 0, m: 0, t: 0 }, inventory: []
    };

    // データの読み込み
    async function init() {
        try {
            const res = await fetch('questions.json');
            if (!res.ok) throw new Error("JSON not found");
            db = await res.json();
        } catch(e) {
            console.warn("外部ファイルが見つからないため、内蔵問題で開始します。");
            db = [
                {q: "CBT方式(Computer Based Testing)とは何ですか？", o: ["コンピュータで受ける試験", "紙で受ける試験", "実技のみの試験", "面接のみの試験"], a: 0, cat: "t"},
                {q: "ITパスポート試験の分野で、経営に関するのは？", o: ["ストラテジ系", "マネジメント系", "テクノロジ系", "物理系"], a: 0, cat: "s"}
            ];
        }
        changeTab('quest');
        updateHeader();
    }

    function saveGame() {
        localStorage.setItem('itp_fixed_save', JSON.stringify(save));
        updateHeader();
    }

    function updateHeader() {
        document.getElementById('kp').innerText = save.kp.toLocaleString();
        const titles = ["初学者", "見習い", "熟練者", "マスター", "神"];
        document.getElementById('rank').innerText = titles[Math.min(4, Math.floor(save.totalCorrect / 20))];
    }

    function changeTab(tab) {
        // 全ナビアイテムからactiveを削除
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        // 指定されたナビアイテムにactiveを追加
        const activeNav = document.getElementById('nav-' + tab);
        if(activeNav) activeNav.classList.add('active');

        const cont = document.getElementById('main-content');
        if(tab === 'quest') {
            cont.innerHTML = `<div class="card"><h2>10問クエスト</h2><p>全 ${db.length} 問からランダムに出題</p><button class="main-btn" onclick="startQuest()">挑戦する</button></div>`;
        } else if(tab === 'gacha') {
            cont.innerHTML = `<div class="card" style="text-align:center;"><h2>ITガチャ</h2><p>1回 100 KP</p><div id="g-res" style="height:60px; font-weight:bold; font-size:20px; display:flex; align-items:center; justify-content:center;">???</div><button class="main-btn" onclick="rollGacha()">回す</button></div>`;
        } else if(tab === 'collection') {
            cont.innerHTML = `<div class="card"><h3>図鑑 (${save.inventory.length}/100)</h3><div class="item-grid">${masterItems.map(it => `<div class="item-slot ${save.inventory.includes(it.id)?'owned':''}"> ${save.inventory.includes(it.id)?it.name:it.id+1}</div>`).join('')}</div></div>`;
        } else if(tab === 'status') {
            cont.innerHTML = `<div class="card"><h3>学習分析</h3><p>正解数: ${save.totalCorrect}</p><p>S系: ${save.stats.s} | M系: ${save.stats.m} | T系: ${save.stats.t}</p></div>`;
        }
    }

    function startQuest() {
        let session = [...db].sort(() => 0.5 - Math.random()).slice(0, 10);
        let idx = 0, corrects = 0;
        const render = () => {
            let q = session[idx];
            document.getElementById('main-content').innerHTML = `
                <div class="card">
                    <small>第 ${idx+1}/10 問</small>
                    <p><b>${q.q}</b></p>
                    <div id="opts">${q.o.map((o,i) => `<div class="option" onclick="checkAnswer(${i},${q.a},'${q.cat}')">${o}</div>`).join('')}</div>
                    <div id="fd" style="display:none; margin:10px 0; padding:10px; border-radius:8px; font-weight:bold;"></div>
                    <button id="next-btn" class="main-btn" style="display:none;" onclick="next()">次へ</button>
                </div>`;
        };
        window.checkAnswer = (i, a, cat) => {
            const fd = document.getElementById('fd');
            fd.style.display = 'block';
            document.querySelectorAll('.option').forEach(el => el.style.pointerEvents = 'none');
            if(i === a) { corrects++; save.stats[cat]++; fd.innerText = "✓ 正解！"; fd.style.background = "#eaffea"; fd.style.color = "green"; }
            else { fd.innerText = `× 不正解... (正解: ${session[idx].o[a]})`; fd.style.background = "#ffeaea"; fd.style.color = "red"; }
            document.getElementById('next-btn').style.display = 'block';
        };
        window.next = () => { idx++; if(idx < 10) render(); else finish(); };
        const finish = () => {
            let gain = corrects * 20; save.kp += gain; save.totalCorrect += corrects; saveGame();
            document.getElementById('main-content').innerHTML = `<div class="card" style="text-align:center;"><h2>終了！</h2><p>${corrects}/10 正解</p><p>${gain} KP 獲得</p><button class="main-btn" onclick="changeTab('quest')">戻る</button></div>`;
        };
        render();
    }

    function rollGacha() {
        if(save.kp < 100) return alert("KP不足！");
        save.kp -= 100;
        let got = masterItems[Math.floor(Math.random() * masterItems.length)];
        if(!save.inventory.includes(got.id)) save.inventory.push(got.id);
        document.getElementById('g-res').innerText = got.name;
        saveGame();
    }

    // 起動
    init();
</script>
</body>
</html>
